services:
  postgres:
    image: postgres:16
    container_name: teia-postgres
    environment:
      POSTGRES_DB: teia
      POSTGRES_USER: teia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teia-dev}
    ports:
      - "5432:5432"
    volumes:
      - teia-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teia -d teia"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  teia-pgdata:
