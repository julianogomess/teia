# Exemplo de proxy reverso para produção.
#
# A aplicação mitiga abuso no nível dela (rate limit por IP/usuário, cotas,
# limite de corpo), mas proteção volumétrica de verdade (DDoS) é papel da
# infraestrutura: este nginx + um serviço na borda (ex.: Cloudflare).

limit_req_zone $binary_remote_addr zone=teia_api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=teia_login:10m rate=5r/m;

server {
    listen 443 ssl;
    server_name chat.teia.org.br;

    # ssl_certificate     /etc/letsencrypt/live/chat.teia.org.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/chat.teia.org.br/privkey.pem;

    client_max_body_size 32k;

    location /api/auth/login {
        limit_req zone=teia_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
    }

    location /api/ {
        limit_req zone=teia_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_read_timeout 90s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name chat.teia.org.br;
    return 301 https://$host$request_uri;
}
